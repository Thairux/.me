<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines }}">
  <title>{{ page.title }} - {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</head>
<body class="{% if page.url == '/' %}home-page{% endif %}">
  <div class="page-glow page-glow-left"></div>
  <div class="page-glow page-glow-right"></div>

  <header class="site-header">
    <div class="container site-header-inner">
      <a href="{{ '/' | relative_url }}" class="brand">
        <span class="brand-mark">T</span>
        <span class="brand-copy">
          <strong>{{ site.title }}</strong>
          <small>{{ site.description }}</small>
        </span>
      </a>

      <div class="header-controls">
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
          <a href="{{ '/projects/' | relative_url }}">Projects</a>
          <a href="{{ '/blog/' | relative_url }}">Blog</a>
        </nav>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle color theme">
          <span class="theme-toggle-icon" aria-hidden="true">◐</span>
          <span class="theme-toggle-label">Auto</span>
        </button>
      </div>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      <section class="page-frame {% if page.url == '/' %}page-frame-home{% endif %}">
        {{ content }}
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container site-footer-inner">
      <div>
        <p class="footer-title">{{ site.title }}</p>
        <p class="footer-copy">Built with love by Peter Thairu Muigai.</p>
      </div>
      <div class="footer-links">
        <a href="https://github.com/{{ site.social_links.github }}" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="https://twitter.com/{{ site.social_links.twitter }}" target="_blank" rel="noopener noreferrer">Twitter</a>
      </div>
    </div>
  </footer>
</body>
</html>
