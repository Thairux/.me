<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    header { background: #f8f9fa; padding: 40px 0; margin-bottom: 40px; }
    header h1 { font-size: 2.5em; margin-bottom: 10px; }
    header p { font-size: 1.1em; color: #666; }
    nav { margin: 20px 0; }
    nav a { margin-right: 20px; text-decoration: none; color: #007bff; }
    nav a:hover { text-decoration: underline; }
    main { margin: 40px 0; }
    footer { border-top: 1px solid #ddd; margin-top: 60px; padding-top: 20px; text-align: center; color: #666; }
    .post { margin-bottom: 40px; }
    .post h2 { margin-bottom: 10px; }
    .post-date { color: #999; font-size: 0.9em; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>{{ site.title }}</h1>
      <p>{{ site.description }}</p>
      <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/projects">Projects</a>
        <a href="/blog">Blog</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>
  <footer>
    <div class="container">
      <p>&copy; 2024 {{ site.author.name }}. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
