---
layout: default
---

<article class="post">
  <div class="container">
    <header class="post-header">
      <h1>{{ page.title }}</h1>
      <div class="post-meta">
        <time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: "%B %d, %Y" }}</time>
        {% if page.author %}
          <span class="post-author">by {{ page.author }}</span>
        {% endif %}
      </div>
    </header>
    
    <div class="post-content">
      {{ content }}
    </div>
    
    <footer class="post-footer">
      <a href="{{ '/blog' | relative_url }}" class="back-link">← Back to Blog</a>
    </footer>
  </div>
</article>
